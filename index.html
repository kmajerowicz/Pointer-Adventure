<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailFinder — Znajdź trasy w okolicy</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <div id="loading-overlay"><div class="spinner"></div></div>

  <div id="controls">
    <h1>TrailFinder</h1>
    <div class="control-group">
      <label for="location-input">Lokalizacja</label>
      <div class="search-row">
        <input type="text" id="location-input" placeholder="np. Zakopane, Bieszczady..." />
        <button id="location-btn" title="Szukaj lokalizacji">&#x1F50D;</button>
      </div>
      <div id="location-results"></div>
    </div>
    <div class="control-group">
      <label for="radius">Promień: <span id="radius-value">10</span> km</label>
      <input type="range" id="radius" min="1" max="25" value="10" step="1" />
    </div>
    <button id="search-btn">Szukaj tras</button>
    <div id="status"></div>
    <div id="legend">
      <div><span class="legend-line hiking"></span> Szlak pieszy</div>
      <div><span class="legend-line path"></span> Ścieżka / droga</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
